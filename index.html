<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>课程报告</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
tailwind.config = {
    darkMode: "class",
    theme: {
        extend: {
            colors: {
                "background": "#fbf9f7",
                "surface": "#fbf9f7",
                "surface-container-lowest": "#ffffff",
                "surface-container-low": "#f5f3f1",
                "surface-container": "#efedeb",
                "surface-container-high": "#eae8e6",
                "surface-container-highest": "#e4e2e0",
                "surface-bright": "#fbf9f7",
                "outline-variant": "#d6c3b8",
                "outline": "#84746a",
                "on-surface": "#1b1c1b",
                "on-surface-variant": "#51443c",
                "on-background": "#1b1c1b",
                "primary": "#85532e",
                "primary-container": "#e8a87c",
                "on-primary": "#ffffff",
                "on-primary-container": "#693c19",
                "on-primary-fixed-variant": "#693c19",
                "primary-fixed": "#ffdcc6",
                "primary-fixed-dim": "#fbb88b",
                "secondary": "#256583",
                "secondary-container": "#a2dcff",
                "on-secondary": "#ffffff",
                "on-secondary-container": "#216280",
                "tertiary": "#286b33",
                "tertiary-container": "#80c683",
                "on-tertiary": "#ffffff",
                "on-tertiary-container": "#08531e",
                "inverse-surface": "#30302f",
                "inverse-on-surface": "#f2f0ee",
                "inverse-primary": "#fbb88b",
                "error": "#ba1a1a",
                "on-error": "#ffffff",
                "error-container": "#ffdad6",
                "on-error-container": "#93000a"
            },
            borderRadius: {
                DEFAULT: "0.5rem",
                lg: "0.5rem",
                xl: "0.75rem",
                full: "9999px"
            },
            fontFamily: {
                sans: ["Plus Jakarta Sans", "sans-serif"]
            },
            fontSize: {
                "body-md": ["14px", { lineHeight: "20px", fontWeight: "400" }],
                "label-md": ["13px", { lineHeight: "18px", letterSpacing: "0.01em", fontWeight: "600" }],
                "label-sm": ["11px", { lineHeight: "14px", letterSpacing: "0.02em", fontWeight: "600" }],
                "headline-lg": ["18px", { lineHeight: "24px", letterSpacing: "-0.01em", fontWeight: "700" }],
                "body-lg": ["16px", { lineHeight: "22px", fontWeight: "500" }],
                "headline-xl": ["24px", { lineHeight: "32px", letterSpacing: "-0.02em", fontWeight: "700" }]
            }
        }
    }
}
</script>
<style>
body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #F7F5F3; }
.report-card {
    background: white;
    border-radius: 12px;
    padding: 20px;
    box-shadow: 0px 2px 12px rgba(0,0,0,0.03);
    margin-bottom: 12px;
}
.material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
}
/* 视频封面 */
.video-wrapper {
    position: relative;
    width: 100%;
    aspect-ratio: 16/9;
    background: linear-gradient(135deg, #1b2e3c 0%, #2d4a5e 100%);
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
}
.video-wrapper video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: none;
}
.video-cover {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
}
.video-cover-icon {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: rgba(255,255,255,0.18);
    backdrop-filter: blur(6px);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.2s, background 0.2s;
}
.video-wrapper:hover .video-cover-icon {
    background: rgba(255,255,255,0.28);
    transform: scale(1.06);
}
.video-cover-label {
    color: rgba(255,255,255,0.85);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.02em;
}
/* 掌握率圆环动画 */
.progress-circle {
    transition: stroke-dashoffset 1s ease;
}
</style>
</head>
<body class="antialiased text-on-surface">

<main class="pt-8 px-4 max-w-lg mx-auto pb-24">

    <!-- 标题 -->
    <header class="mb-6 text-center">
        <h1 class="text-headline-xl font-bold text-on-surface" id="pageTitle">课后学习报告</h1>
    </header>

    <!-- 课程信息 -->
    <div class="report-card">
        <div class="flex items-center gap-2.5 mb-3">
            <div class="p-1.5 bg-secondary-container/40 rounded-lg">
                <span class="material-symbols-outlined text-secondary text-xl">menu_book</span>
            </div>
            <h3 class="text-headline-lg">课程信息</h3>
        </div>
        <div class="space-y-2.5">
            <div class="flex items-center justify-between">
                <span class="text-label-md text-on-surface-variant">课程名称</span>
                <span class="text-body-md font-bold" id="courseName">—</span>
            </div>
            <div class="flex items-center justify-between">
                <span class="text-label-md text-on-surface-variant">上课时间</span>
                <span class="text-body-md" id="courseTime">—</span>
            </div>
            <div class="mt-3 p-3 bg-surface-container rounded-xl border border-dashed border-outline-variant">
                <p class="text-body-md text-on-surface-variant leading-relaxed" id="courseKey">—</p>
            </div>
        </div>
    </div>

    <!-- 核心知识点 -->
    <div class="report-card">
        <div class="flex items-center gap-2.5 mb-3">
            <div class="p-1.5 bg-tertiary-container/40 rounded-lg">
                <span class="material-symbols-outlined text-tertiary text-xl">auto_awesome</span>
            </div>
            <h3 class="text-headline-lg">核心知识点</h3>
        </div>
        <ul class="space-y-2 mb-4" id="coreList">
            <!-- 由JS填充 -->
        </ul>
        <div class="p-3 bg-surface-container rounded-xl border border-dashed border-outline-variant">
            <p class="text-body-md text-on-surface-variant leading-relaxed" id="coreSummary">—</p>
        </div>
    </div>

    <!-- 学习成果 -->
    <div class="report-card">
        <div class="flex items-center gap-2.5 mb-4">
            <div class="p-1.5 bg-primary-container/40 rounded-lg">
                <span class="material-symbols-outlined text-primary text-xl">analytics</span>
            </div>
            <h3 class="text-headline-lg">学习成果</h3>
        </div>
        <!-- 圆环 -->
        <div class="flex flex-col items-center mb-5">
            <div class="relative w-24 h-24">
                <svg class="w-full h-full -rotate-90" viewBox="0 0 96 96">
                    <circle cx="48" cy="48" r="40" fill="transparent"
                        stroke="#eae8e6" stroke-width="7"/>
                    <circle id="progressArc" cx="48" cy="48" r="40" fill="transparent"
                        stroke="#286b33" stroke-width="8" stroke-linecap="round"
                        stroke-dasharray="251.2"
                        stroke-dashoffset="125.6"
                        class="progress-circle"/>
                </svg>
                <div class="absolute inset-0 flex flex-col items-center justify-center">
                    <span class="text-lg font-bold" id="rateText">—</span>
                    <span class="text-[10px] text-on-surface-variant">掌握率</span>
                </div>
            </div>
        </div>
        <!-- 统计格 -->
        <div class="grid grid-cols-3 gap-2.5 mb-4">
            <div class="bg-surface-container p-3 rounded-xl text-center">
                <div class="text-lg font-bold text-on-surface" id="totalCount">—</div>
                <div class="text-label-sm text-on-surface-variant">答题数</div>
            </div>
            <div class="bg-surface-container p-3 rounded-xl text-center">
                <div class="text-lg font-bold text-tertiary" id="correctCount">—</div>
                <div class="text-label-sm text-on-surface-variant">已掌握</div>
            </div>
            <div class="bg-surface-container p-3 rounded-xl text-center">
                <div class="text-lg font-bold text-on-primary-fixed-variant" id="wrongCount">—</div>
                <div class="text-label-sm text-on-surface-variant">待巩固</div>
            </div>
        </div>
        <!-- 知识点详情 -->
        <div class="mb-4">
            <div class="text-label-sm text-on-surface-variant mb-1.5">知识点详情</div>
            <div class="flex flex-wrap gap-1.5" id="knowledgeTags">
                <!-- 由JS填充 -->
            </div>
        </div>
        <!-- 答题情况评价 -->
        <div class="p-3 bg-tertiary/10 rounded-xl">
            <div class="flex items-center gap-1.5 mb-1.5">
                <span class="material-symbols-outlined text-tertiary text-sm"
                    style="font-variation-settings:'FILL' 1;">stars</span>
                <span class="text-label-md text-tertiary">答题情况评价</span>
            </div>
            <p class="text-body-md text-on-surface-variant" id="quizComment">—</p>
        </div>
    </div>

    <!-- 课堂精彩瞬间 -->
    <div class="report-card">
        <div class="flex items-center gap-2.5 mb-3">
            <div class="p-1.5 bg-secondary-container/40 rounded-lg">
                <span class="material-symbols-outlined text-secondary text-xl">videocam</span>
            </div>
            <h3 class="text-headline-lg">课堂精彩瞬间</h3>
        </div>
        <!-- 视频区域 -->
        <div class="video-wrapper mb-3" id="videoWrapper" onclick="toggleVideo()">
            <video id="highlightVideo" preload="none" playsinline></video>
            <div class="video-cover" id="videoCover">
                <div class="video-cover-icon">
                    <span class="material-symbols-outlined text-white text-4xl"
                        style="font-variation-settings:'FILL' 1;">play_arrow</span>
                </div>
                <span class="video-cover-label">点击播放精彩瞬间</span>
            </div>
        </div>
        <p class="text-body-md text-on-surface-variant" id="videoComment">—</p>
    </div>

    <!-- 老师点评 -->
    <div class="report-card">
        <div class="flex items-center gap-2.5 mb-4">
            <div class="p-1.5 bg-primary-container/40 rounded-lg">
                <span class="material-symbols-outlined text-primary text-xl">forum</span>
            </div>
            <h3 class="text-headline-lg">老师点评</h3>
        </div>
        <div class="mb-3">
            <div class="text-label-md font-bold text-on-surface" id="teacherName">—</div>
        </div>
        <div class="p-4 bg-surface-container-low rounded-xl">
            <p class="text-body-md text-on-surface italic leading-relaxed" id="teacherComment">—</p>
        </div>
    </div>

    <!-- 下节预告 -->
    <div class="report-card">
        <div class="flex items-center gap-2.5 mb-3">
            <div class="p-1.5 bg-secondary-container/40 rounded-lg">
                <span class="material-symbols-outlined text-secondary text-xl">forward</span>
            </div>
            <h3 class="text-headline-lg">下节预告</h3>
        </div>
        <p class="text-body-md text-on-surface-variant leading-relaxed" id="nextLesson">—</p>
    </div>

    <!-- 预习建议 -->
    <div class="report-card">
        <div class="flex items-center gap-2.5 mb-3">
            <div class="p-1.5 bg-tertiary-container/40 rounded-lg">
                <span class="material-symbols-outlined text-tertiary text-xl">lightbulb</span>
            </div>
            <h3 class="text-headline-lg">预习建议</h3>
        </div>
        <ul class="space-y-2" id="suggestionList">
            <!-- 由JS填充 -->
        </ul>
    </div>

    <!-- 分享按钮 -->
    <div class="flex justify-center mt-6 mb-4">
        <button class="bg-[#81C784] text-white font-bold py-3 px-12 rounded-full shadow-lg active:scale-95 transition-transform flex items-center gap-2 text-sm">
            <span class="material-symbols-outlined text-lg">share</span>
            分享报告
        </button>
    </div>

</main>

<script>
// ===== 飞书数据配置（临时测试用）=====
const FEISHU_APP_ID = 'cli_a971a71ab0395cce';
const FEISHU_APP_SECRET = 'T94yU3Og4QHiWxqmw4DNreSCipBmlJf7';
const BITABLE_APP_TOKEN = 'DOK5bKaDtaJAnpsp3UZcuibRnFf';
const TABLE_ID = 'tblfigiNW09OkXU9';

// 从URL参数获取记录ID，例如 ?record=recXXXX
const urlParams = new URLSearchParams(window.location.search);
const RECORD_ID = urlParams.get('record');

// ===== 工具函数 =====

// 解析本节课核心：把"核心1：xxx\n核心2：xxx\n\n总结段落"拆开
function parseCoreKnowledge(text) {
    if (!text) return { items: [], summary: '' };
    const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
    const items = [];
    const summaryLines = [];
    let reachedSummary = false;

    for (const line of lines) {
        if (!reachedSummary && /^核心\d+[：:]/.test(line)) {
            // 去掉"核心1："前缀，只留内容
            items.push(line.replace(/^核心\d+[：:]\s*/, ''));
        } else {
            reachedSummary = true;
            summaryLines.push(line);
        }
    }
    return { items, summary: summaryLines.join('\n') };
}

// 解析预习建议：按行或按数字序号拆分
function parseSuggestions(text) {
    if (!text) return [];
    return text.split('\n')
        .map(l => l.trim().replace(/^\d+[\.\、]\s*/, ''))
        .filter(Boolean);
}

// 解析知识点：空格或换行分隔
function parseKnowledgeTags(text) {
    if (!text) return [];
    return text.split(/[\s\n]+/).map(t => t.trim()).filter(Boolean);
}

// 解析正确率数字（字段可能是 {text:"83%",type:"text"} 或纯字符串）
function parseRate(val) {
    if (!val) return 0;
    if (typeof val === 'object' && val.text) val = val.text;
    return parseFloat(String(val).replace('%', '')) || 0;
}

// 获取视频链接（字段可能是 {link:"...",text:"..."} 对象）
function parseVideoUrl(val) {
    if (!val) return '';
    if (typeof val === 'object' && val.link) return val.link;
    if (typeof val === 'string') return val;
    return '';
}

// ===== 渲染函数 =====
function render(data) {
    const f = data.fields;

    // 标题
    const name = f['學生姓名'] || '';
    document.getElementById('pageTitle').textContent = name ? `${name}的课后学习报告` : '课后学习报告';
    document.title = name ? `课程报告 - ${name}` : '课程报告';

    // 课程信息
    document.getElementById('courseName').textContent = f['課程名稱'] || '—';
    document.getElementById('courseTime').textContent = f['上課時間'] || '—';
    document.getElementById('courseKey').textContent = f['课程重点'] || '—';

    // 核心知识点
    const core = parseCoreKnowledge(f['本节课核心'] || '');
    const coreList = document.getElementById('coreList');
    if (core.items.length > 0) {
        coreList.innerHTML = core.items.map(item => `
            <li class="flex items-center gap-2.5">
                <span class="material-symbols-outlined text-tertiary text-lg"
                    style="font-variation-settings:'FILL' 1;">check_circle</span>
                <span class="text-body-md">${item}</span>
            </li>`).join('');
    } else {
        coreList.innerHTML = '';
    }
    document.getElementById('coreSummary').textContent = core.summary || '—';

    // 学习成果
    const rate = parseRate(f['答題正確率']);
    document.getElementById('rateText').textContent = rate ? `${Math.round(rate)}%` : '—';
    document.getElementById('totalCount').textContent = f['答題總數'] != null ? f['答題總數'] : '—';
    document.getElementById('correctCount').textContent = f['答題正確數'] != null ? f['答題正確數'] : '—';
    document.getElementById('wrongCount').textContent = f['答错数'] != null ? f['答错数'] : '—';

    // 圆环动画
    const circumference = 251.2;
    const offset = circumference * (1 - rate / 100);
    setTimeout(() => {
        document.getElementById('progressArc').style.strokeDashoffset = offset;
    }, 300);

    // 知识点标签
    const tags = parseKnowledgeTags(f['課程知識點'] || '');
    document.getElementById('knowledgeTags').innerHTML = tags.map(tag => `
        <span class="px-2 py-0.5 bg-secondary-container/20 text-secondary border border-secondary-container rounded-full text-[11px] font-semibold">${tag}</span>
    `).join('') || '<span class="text-label-sm text-on-surface-variant">暂无数据</span>';

    // 答题情况评价
    document.getElementById('quizComment').textContent = f['答题情况评价'] || f['成长寄语'] || '—';

    // 高光视频
    const videoUrl = parseVideoUrl(f['高光视频']);
    if (videoUrl) {
        const video = document.getElementById('highlightVideo');
        video.src = videoUrl;
    }
    document.getElementById('videoComment').textContent = f['高光视频分析'] || '—';

    // 老师点评
    document.getElementById('teacherName').textContent = f['主講老師'] || '—';
    document.getElementById('teacherComment').textContent = f['老师点评'] || '—';

    // 下节预告
    document.getElementById('nextLesson').textContent = f['下节课预告'] || '—';

    // 预习建议
    const suggestions = parseSuggestions(f['下节课预习建议'] || '');
    document.getElementById('suggestionList').innerHTML = suggestions.map(s => `
        <li class="flex items-start gap-2">
            <span class="text-tertiary mt-1 text-[10px]">●</span>
            <span class="text-body-md text-on-surface-variant">${s}</span>
        </li>`).join('') || '<li class="text-body-md text-on-surface-variant">暂无建议</li>';
}

// ===== 视频播放切换 =====
function toggleVideo() {
    const video = document.getElementById('highlightVideo');
    const cover = document.getElementById('videoCover');
    if (!video.src) return;
    video.style.display = 'block';
    cover.style.display = 'none';
    video.play();
}

// ===== 飞书数据加载 =====
async function loadData() {
    try {
        // 1. 获取 token
        const tokenResp = await fetch('https://open.feishu.cn/open-apis/auth/v3/tenant_access_token/internal', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ app_id: FEISHU_APP_ID, app_secret: FEISHU_APP_SECRET })
        });
        const tokenData = await tokenResp.json();
        const token = tokenData.tenant_access_token;
        if (!token) throw new Error('Token 获取失败');

        // 2. 获取记录
        let url;
        if (RECORD_ID) {
            url = `https://open.feishu.cn/open-apis/bitable/v1/apps/${BITABLE_APP_TOKEN}/tables/${TABLE_ID}/records/${RECORD_ID}`;
        } else {
            url = `https://open.feishu.cn/open-apis/bitable/v1/apps/${BITABLE_APP_TOKEN}/tables/${TABLE_ID}/records?page_size=1`;
        }

        const dataResp = await fetch(url, {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        const result = await dataResp.json();

        let record;
        if (RECORD_ID) {
            record = result.data?.record;
        } else {
            record = result.data?.items?.[0];
        }

        if (!record) throw new Error('未找到记录');
        render(record);

    } catch (err) {
        console.error('数据加载失败:', err);
        document.getElementById('pageTitle').textContent = '数据加载失败，请刷新重试';
    }
}

document.addEventListener('DOMContentLoaded', loadData);
</script>
</body>
</html>
