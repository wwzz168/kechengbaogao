name: Generate Reports

on:
  schedule:
    - cron: '*/15 * * * *'  # 每15分钟检查一次
  workflow_dispatch:       # 手动触发
  repository_dispatch:     # 飞书触发
    types: [feishu-update]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests playwright && python -m playwright install chromium --with-deps

      - name: Generate HTML Reports & Screenshots
        run: python generate.py
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./reports
          force_orphan: true

      - name: Update Feishu Links
        run: python generate_report_links.py
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
